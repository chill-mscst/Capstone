<section id="contact" class="py-5">
  <div class="container py-5">
    <h2 class="section-title text-center display-5 mb-5">CONTACT US</h2>
    
    <div class="row g-5 justify-content-center">
      <div class="col-lg-5">
        <form class="p-4 border border-secondary rounded bg-dark">
          <div class="mb-3">
            <label class="form-label">Name:   </label>
            <input type="text" class="form-control bg-dark text-white border-secondary">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone:  </label>
            <input type="tel" class="form-control bg-dark text-white border-secondary">
          </div>
          <div class="mb-3">
            <label class="form-label">Email:  </label>
            <input type="email" class="form-control bg-dark text-white border-secondary">
          </div>
          <div class="mb-4">
            <label class="form-label">Message:</label>
            <textarea class="form-control bg-dark text-white border-secondary" rows="5"></textarea>
          </div>
          <button type="submit" class="btn btn-psycho w-100 py-3 fw-bold">
            SEND
          </button>
        </form>
      </div>
      
      <div class="col-lg-5">
        <div class="mb-4">
          <h4>Office</h4>
          <p class="text-secondary">
            Dakota, MN 55925<br><br>
            <i class="bi bi-telephone-fill me-2"></i> (555) 555-5555<br>
            <i class="bi bi-envelope-fill me-2"></i> jobs@psychoconstruction.com
          </p>
        </div>
        
      <div class="col-lg-5">
